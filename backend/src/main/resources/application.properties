spring.application.name=attijari-growth-engine

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/attijari_growth_engine

# Server
server.port=8081

# JWT
app.jwt.secret=AttijariGrowthEngineSecretKey2024XYZSecureRandomStringForProduction
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Jackson — désérialisation des dates ISO (LocalDateTime)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.attijari=DEBUG
